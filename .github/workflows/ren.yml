name: Rename Package translator to prttp

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (preview without committing)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      target_branch:
        description: 'Branch to apply changes to'
        required: false
        default: 'main'

jobs:
  rename:
    name: Rename translator to prttp
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Preview affected files
        run: |
          echo "=== Files containing 'com.translator.app' ==="
          grep -rl 'com.translator.app' . \
            --exclude-dir='.git' \
            --exclude-dir='.github' \
            --exclude-dir='build' \
            --exclude-dir='.gradle' \
            --exclude-dir='.idea' \
            || echo "(none found)"
          echo ""
          echo "=== Paths containing 'translator' ==="
          find . \
            -not -path './.git/*' \
            -not -path './.github/*' \
            -not -path './build/*' \
            -not -path './.gradle/*' \
            -path '*com/translator*' \
            || echo "(none found)"

      - name: Replace package in file contents
        if: github.event.inputs.dry_run == 'false'
        run: |
          grep -rl 'com.translator.app' . \
            --exclude-dir='.git' \
            --exclude-dir='.github' \
            --exclude-dir='build' \
            --exclude-dir='.gradle' \
            --exclude-dir='.idea' \
            --include='*.kt' \
            --include='*.java' \
            --include='*.xml' \
            --include='*.gradle' \
            --include='*.kts' \
            --include='*.json' \
            --include='*.pro' \
            --include='*.properties' \
          | xargs -I{} sed -i 's/com\.translator\.app/com.prttp.app/g' {}
          echo "File contents updated."

      - name: Rename directory com/translator to com/prttp
        if: github.event.inputs.dry_run == 'false'
        run: |
          find . -depth \
            -not -path './.git/*' \
            -not -path './build/*' \
            -not -path './.gradle/*' \
            -type d \
            -path '*com/translator' \
          | while IFS= read -r dir; do
              new_dir="${dir//com\/translator/com\/prttp}"
              echo "Moving: $dir -> $new_dir"
              mkdir -p "$(dirname "$new_dir")"
              mv "$dir" "$new_dir"
            done
          echo "Directories renamed."

      - name: Commit and push changes
        if: github.event.inputs.dry_run == 'false'
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "refactor: rename package com.translator.app to com.prttp.app"
            git push origin ${{ github.event.inputs.target_branch }}
            echo "Pushed to ${{ github.event.inputs.target_branch }}."
          fi

      - name: Dry run summary
        if: github.event.inputs.dry_run == 'true'
        run: |
          echo "DRY RUN complete — no changes made."
          echo "Set dry_run = false to apply."