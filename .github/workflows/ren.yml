name: Rename Package translator → rtp

on:
  workflow_dispatch:
    inputs:
      keep_application_id:
        description: "Оставить applicationId = com.translator.app (true/false)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  rename:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rename package com.translator.app → com.rtp.app
        run: |
          set -euo pipefail

          OLD_PKG="com.translator.app"
          NEW_PKG="com.rtp.app"
          OLD_DIR="com/translator/app"
          NEW_DIR="com/rtp/app"

          echo "▶ 1/4  Замена строк '$OLD_PKG' → '$NEW_PKG'…"
          grep -rIl --exclude-dir=.git --exclude-dir=build --exclude-dir=.gradle \
            --include='*.kt'  --include='*.kts' --include='*.java' \
            --include='*.xml' --include='*.pro' --include='*.gradle' \
            --include='*.json' --include='*.txt' \
            "$OLD_PKG" . | while read -r f; do
              sed -i "s/${OLD_PKG//./\\.}/${NEW_PKG//./\\.}/g" "$f"
              echo "   • $f"
            done || echo "   (совпадений не найдено)"

          echo "▶ 2/4  Перенос папок $OLD_DIR → $NEW_DIR…"
          for SS in app/src/*; do
            for LANG in java kotlin; do
              SRC="$SS/$LANG/$OLD_DIR"
              if [ -d "$SRC" ]; then
                DST="$SS/$LANG/$NEW_DIR"
                mkdir -p "$(dirname "$DST")"
                git mv "$SRC" "$DST"
                echo "   • $SRC → $DST"
              fi
            done
          done

          for SS in app/src/*; do
            for LANG in java kotlin; do
              ORPHAN="$SS/$LANG/com/translator"
              if [ -d "$ORPHAN" ] && [ -z "$(ls -A "$ORPHAN")" ]; then
                rmdir "$ORPHAN" && echo "   • удалена пустая $ORPHAN"
              fi
            done
          done

          echo "▶ 3/4  applicationId…"
          if [ "${{ github.event.inputs.keep_application_id }}" = "true" ]; then
            GRADLE_FILE="$(ls app/build.gradle.kts app/build.gradle 2>/dev/null | head -n1 || true)"
            if [ -n "${GRADLE_FILE:-}" ]; then
              sed -i 's/applicationId = "com\.rtp\.app"/applicationId = "com.translator.app"/' "$GRADLE_FILE" || true
              sed -i 's/applicationId "com\.rtp\.app"/applicationId "com.translator.app"/'     "$GRADLE_FILE" || true
              echo "   • applicationId оставлен прежним"
            fi
          fi

          echo "▶ 4/4  Контроль остатков…"
          if grep -rIn --exclude-dir=.git --exclude-dir=build "$OLD_PKG" \
              --include='*.kt' --include='*.kts' --include='*.xml' . ; then
            echo "::warning::Остались упоминания $OLD_PKG"
          else
            echo "   ✓ упоминаний $OLD_PKG не осталось"
          fi

      - name: Commit & push
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet && git diff --cached --quiet; then
            echo "Нет изменений — пакет уже переименован."
            exit 0
          fi
          git add -A
          git commit -m "chore: rename package com.translator.app → com.rtp.app"
          git push
