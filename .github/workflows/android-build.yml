name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare-vosk:
    uses: ./.github/workflows/prepare-vosk-models.yml

  build-and-release:
    needs: prepare-vosk
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Vosk models
        uses: actions/download-artifact@v4
        with:
          name: vosk-models
          path: app/src/main/assets/vosk/

      - name: Verify Vosk models in build tree
        run: |
          test -f app/src/main/assets/vosk/ru/am/final.mdl
          test -f app/src/main/assets/vosk/de/am/final.mdl
          echo "✓ Vosk models in place"
          du -sh app/src/main/assets/vosk/ru app/src/main/assets/vosk/de

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-home-cache-includes: |
            caches/modules-2
            caches/jars-9
            caches/transforms-4
            caches/build-cache-1
            wrapper/dists
            notifications
          gradle-home-cache-excludes: |
            caches/[0-9]*.[0-9]*
            caches/journal-1

      - name: Build Debug APK
        run: |
          gradle assembleDebug \
            --parallel \
            --max-workers=4 \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseG1GC -XX:MaxMetaspaceSize=512m" \
            -Dorg.gradle.parallel=true \
            -Dandroid.enableJetifier=false

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "v1.0.${{ github.run_number }}"
          body: |
            **Commit:** `${{ github.event.head_commit.message }}`
            **SHA:** `${{ github.sha }}`
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}