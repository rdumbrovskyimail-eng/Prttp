name: Prepare Vosk Models

on:
  workflow_dispatch:
  workflow_call:

jobs:
  prepare-models:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Vosk models
        id: vosk-cache
        uses: actions/cache@v4
        with:
          path: vosk-models-cache
          key: vosk-models-ru-0.22-de-0.15-v1

      - name: Download Russian model
        if: steps.vosk-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          mkdir -p vosk-models-cache/ru
          echo "▶ Downloading vosk-model-small-ru-0.22..."
          curl -L -o /tmp/vosk-ru.zip \
            https://alphacephei.com/vosk/models/vosk-model-small-ru-0.22.zip
          
          echo "▶ Extracting..."
          unzip -q /tmp/vosk-ru.zip -d /tmp/vosk-ru-extract
          mv /tmp/vosk-ru-extract/vosk-model-small-ru-0.22/* vosk-models-cache/ru/
          rm -rf /tmp/vosk-ru.zip /tmp/vosk-ru-extract
          echo "✓ Russian model cached"

      - name: Download German model
        if: steps.vosk-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          mkdir -p vosk-models-cache/de
          echo "▶ Downloading vosk-model-small-de-0.15..."
          curl -L -o /tmp/vosk-de.zip \
            https://alphacephei.com/vosk/models/vosk-model-small-de-0.15.zip
          
          echo "▶ Extracting..."
          unzip -q /tmp/vosk-de.zip -d /tmp/vosk-de-extract
          mv /tmp/vosk-de-extract/vosk-model-small-de-0.15/* vosk-models-cache/de/
          rm -rf /tmp/vosk-de.zip /tmp/vosk-de-extract
          echo "✓ German model cached"

      - name: Verify model integrity
        run: |
          set -e
          for lang in ru de; do
            for f in am/final.mdl conf/model.conf graph/HCLr.fst ivector/final.ie; do
              path="vosk-models-cache/$lang/$f"
              if [ ! -f "$path" ]; then
                echo "✗ MISSING: $path"
                ls -la "vosk-models-cache/$lang/" || true
                exit 1
              fi
            done
            echo "✓ Model $lang complete"
          done

      - name: Upload models as artifact
        uses: actions/upload-artifact@v4
        with:
          name: vosk-models
          path: vosk-models-cache/
          retention-days: 1